<html lang="zh-CN">
<head>

    <style>
        :root {
            --primary: #FFD700; /* 高级明黄 */
            --primary-dark: #E6C200; /* 深金 */
            --bg-grad1: #FFFDF2; /* 渐变亮黄 */
            --bg-grad2: #FFF5CC; /* 渐变暖黄 */
            --text-main: #1A1A1A; /* 极致黑 */
            --text-muted: #555555; /* 高级灰 */
            --accent-green: #004D40; /* 极少量墨绿点缀 */
        }
        body {
            font-family: "Helvetica Neue", Helvetica, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
            background: linear-gradient(135deg, var(--bg-grad1) 0%, var(--bg-grad2) 100%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        .container {
            width: 100%;
            max-width: 520px;
            padding: 25px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            z-index: 1; 
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--text-main); font-size: 28px; font-weight: 900; margin: 5px 0; letter-spacing: 2px; }
        .header p { color: var(--text-muted); font-weight: 600; font-size: 12px; margin: 0; letter-spacing: 3px; text-transform: uppercase; }
        
        .card {
            background: #FFFFFF;
            border-radius: 24px;
            padding: 30px 25px;
            box-shadow: 0 15px 35px rgba(200, 150, 0, 0.08);
            flex-grow: 1;
            border: 1px solid rgba(255, 215, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px;
            background: linear-gradient(90deg, #FFDF00, #D4AF37, #FFDF00);
        }

        .gallery-title { text-align: center; font-size: 13px; color: var(--text-muted); margin-bottom: 20px; font-weight: bold; letter-spacing: 1px; }
        
        .gallery { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 30px; }
        .gallery-item { background: #FAFAFA; border: 1px solid #EBEBEB; border-radius: 16px; padding: 20px 10px; text-align: center; transition: all 0.3s; }
        .gallery-item:hover { transform: translateY(-4px); border-color: var(--primary); background: #FFFDF5; box-shadow: 0 8px 15px rgba(255,215,0,0.15); }
        .gallery-item img { width: 130px; height: 130px; object-fit: contain; margin-bottom: 12px; transition: transform 0.3s; }
        .gallery-item:hover img { transform: scale(1.08); }
        .gallery-item .name { font-size: 15px; font-weight: 900; color: var(--text-main); }
        .gallery-item .tag { font-size: 12px; color: var(--text-muted); margin-top: 5px; }

        .btn {
            display: block; width: 100%; padding: 18px; margin: 12px 0;
            background: var(--text-main); border: none; border-radius: 12px;
            font-size: 16px; font-weight: bold; color: var(--primary); cursor: pointer;
            transition: all 0.3s ease; letter-spacing: 1px;
        }
        .btn:hover { background: #333333; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        
        .btn-option {
            background: #FFFFFF; border: 2px solid #EBEBEB; color: var(--text-main);
            text-align: left; font-weight: 500; letter-spacing: 0;
        }
        .btn-option:hover { 
            background: var(--bg-grad1); border-color: var(--primary); 
            color: var(--text-main); font-weight: bold; box-shadow: none; transform: translateX(5px);
        }
        .btn-prev { background: transparent; border: 1px solid #DDD; color: var(--text-muted); font-size: 13px; padding: 12px; margin-top: auto; }
        .btn-prev:hover { background: #F5F5F5; transform: none; box-shadow: none; color: var(--text-main); border-color: #CCC; }
        .hidden { display: none !important; }
        
        .progress-container { margin-bottom: 25px; text-align: center; display: flex; align-items: center; justify-content: center; flex-direction: column;}
        
        .progress-icon { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); margin-right: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .progress-text-wrapper { display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 900; color: var(--text-main); }
        
        .progress-bar { width: 100%; background: #F0F0F0; border-radius: 10px; height: 6px; margin-top: 15px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #FFDF00, #D4AF37); height: 100%; border-radius: 10px; width: 0%; transition: width 0.4s cubic-bezier(0.25, 0.8, 0.25, 1); }
        
        /* ---------------- 加载页全屏科幻动效样式 ---------------- */
        #loading-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100vh;

            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #loading-screen.active {
            opacity: 1;
            pointer-events: all;
        }
        #nebulaCanvas {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
        }
        .loading-content {
            z-index: 2;
            text-align: center;
        }
        .loading-content h3 {
            color: var(--primary);
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 2px;

            border: 3px solid var(--primary);

            animation: pulse 1.5s infinite alternate;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 10px rgba(255, 215, 0, 0.2); }
            100% { transform: scale(1.05); box-shadow: 0 0 30px rgba(255, 215, 0, 0.8); }
        }

        .result-header { text-align: center; margin-bottom: 10px; }
        .mascot-img { width: 220px; height: 220px; object-fit: contain; margin: 10px auto 20px auto; display: block; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.12)); }
        
        .result-title { font-size: 36px; font-weight: 900; color: var(--text-main); margin-bottom: 8px; letter-spacing: 2px; }
        .result-tag { display: inline-block; font-size: 14px; font-weight: bold; color: var(--text-main); background: var(--primary); padding: 6px 18px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(255,215,0,0.3); }
        
        .radar-container { width: 100%; display: flex; justify-content: center; align-items: center; margin-bottom: 25px; }
        #radarChart { max-width: 100%; height: auto; }

        .result-desc-box { background: #FAFAFA; border-left: 4px solid var(--text-main); padding: 20px; margin-bottom: 20px; border-radius: 0 12px 12px 0; }
        .result-desc { line-height: 1.9; font-size: 14px; color: var(--text-muted); text-align: justify; }
        .result-advice { font-size: 13px; font-weight: bold; color: var(--accent-green); background: #F0F9F6; padding: 18px; border-radius: 12px; margin-bottom: 25px; line-height: 1.8; border: 1px solid rgba(0,77,64,0.1); }
        
        .brand { text-align: center; font-size: 11px; color: var(--text-muted); padding: 25px 0 10px 0; margin-top: auto; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>

<script>
    // ---------------- 全屏星云集聚科幻动效 ----------------
    let nebulaAnimationId;
    function initNebulaEffect() {
        const canvas = document.getElementById('nebulaCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        let particles = [];
        // 生成 400 个星云粒子
        for (let i = 0; i < 400; i++) {
            particles.push({
                angle: Math.random() * Math.PI * 2,
                dist: Math.random() * (canvas.width > canvas.height ? canvas.width : canvas.height),
                speed: Math.random() * 0.02 + 0.005,
                size: Math.random() * 2 + 0.5,
                alpha: Math.random() * 0.8 + 0.2
            });
        }
        
        let startTime = Date.now();

        function draw() {
            let elapsed = Date.now() - startTime;
            // 动画持续 3.5 秒
            let progress = elapsed / 3500; 
            
            if (progress > 1) {
                cancelAnimationFrame(nebulaAnimationId);
                return;
            }

            // 绘制带有拖尾效果的暗黑背景
            ctx.fillStyle = 'rgba(26, 26, 26, 0.2)'; 
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            let centerX = canvas.width / 2;
            let centerY = canvas.height / 2;

            ctx.save();
            ctx.translate(centerX, centerY);

            for (let p of particles) {
                // 粒子随着进度加速旋转
                p.angle += p.speed + progress * 0.1;
                // 粒子向中心坍缩集聚
                let currentDist = p.dist * (1 - Math.pow(progress, 1.5)); 

                let x = Math.cos(p.angle) * currentDist;
                let y = Math.sin(p.angle) * currentDist;

                ctx.fillStyle = `rgba(255, 215, 0, ${p.alpha})`; // 金色星云粒子
                ctx.beginPath();
                ctx.arc(x, y, p.size, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();

            nebulaAnimationId = requestAnimationFrame(draw);
        }
        draw();
    }
    // ---------------- 粒子动效结束 ----------------

    let currentQuestion = 0;

    function showQuestion() {
        const q = questions[currentQuestion];
        document.getElementById('question-text').innerText = q.text;
        document.getElementById('progress-text').innerText = `${currentQuestion + 1} / ${questions.length}`;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-option';
            btn.innerText = opt.text;
            btn.onclick = () => selectOption(opt.type);
            optionsDiv.appendChild(btn);
        });
        
        document.getElementById('progress').style.width = `${((currentQuestion) / questions.length) * 100}%`;

        const prevBtn = document.getElementById('btn-prev');
        if (currentQuestion > 0) {
            prevBtn.classList.remove('hidden');
        } else {
            prevBtn.classList.add('hidden');
        }
    }

    function selectOption(type) {
        userChoices[currentQuestion] = type;
        currentQuestion++;
        
        if (currentQuestion < questions.length) {
            showQuestion();
        } else {
            document.getElementById('progress').style.width = `100%`;
            showLoading();
        }
    }

    function prevQuestion() {
        if (currentQuestion > 0) {
            currentQuestion--;
            showQuestion();
        }
    }

    function drawRadarChart(stats) {
        const canvas = document.getElementById('radarChart');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const centerX = width / 2;
        const centerY = height / 2 + 10;
        const radius = 90;
        const sides = 5;
        const labels = ['控制欲', '社恐度', '戏精值', '松弛感', '反骨值'];
        
        ctx.clearRect(0, 0, width, height);

        // 绘制背景蛛网
        ctx.strokeStyle = 'rgba(255, 215, 0, 0.4)';
        ctx.lineWidth = 1;
        for (let level = 1; level <= 4; level++) {
            let r = radius * (level / 4);
            ctx.beginPath();
            for (let i = 0; i < sides; i++) {
                let angle = (Math.PI * 2 / sides) * i - Math.PI / 2;
                let x = centerX + r * Math.cos(angle);
                let y = centerY + r * Math.sin(angle);
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.stroke();
        }

        // 绘制轴线和文字
        ctx.font = 'bold 12px "Microsoft YaHei"';
        ctx.fillStyle = '#555';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        for (let i = 0; i < sides; i++) {
            let angle = (Math.PI * 2 / sides) * i - Math.PI / 2;
            let x = centerX + radius * Math.cos(angle);
            let y = centerY + radius * Math.sin(angle);
            
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(x, y);
            ctx.stroke();
            
            let labelX = centerX + (radius + 25) * Math.cos(angle);
            let labelY = centerY + (radius + 20) * Math.sin(angle);
            ctx.fillText(labels[i], labelX, labelY);
        }

        // 绘制数据半透明填充区
        ctx.beginPath();
        for (let i = 0; i < sides; i++) {
            let angle = (Math.PI * 2 / sides) * i - Math.PI / 2;
            let value = stats[i] || 0;
            let r = radius * (value / 100);
            let x = centerX + r * Math.cos(angle);
            let y = centerY + r * Math.sin(angle);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.closePath();
        
        ctx.fillStyle = 'rgba(255, 215, 0, 0.5)';
        ctx.fill();
        ctx.strokeStyle = '#FFC300';
        ctx.lineWidth = 2;
        ctx.stroke();
        
        ctx.fillStyle = '#1A1A1A';
        for (let i = 0; i < sides; i++) {
            let angle = (Math.PI * 2 / sides) * i - Math.PI / 2;
            let value = stats[i] || 0;
            let r = radius * (value / 100);
            let x = centerX + r * Math.cos(angle);
            let y = centerY + r * Math.sin(angle);
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.fill();
        }
    }

        document.getElementById('res-tag').innerText = res.tag;
        document.getElementById('res-desc').innerHTML = res.desc;
        document.getElementById('res-advice').innerText = res.advice;
        
        setTimeout(() => {
            drawRadarChart(res.stats);
        }, 100);
    }

    function restart() {
        document.getElementById('result').classList.add('hidden');
        document.getElementById('home').classList.remove('hidden');
    }
</script>
</body>
</html>
